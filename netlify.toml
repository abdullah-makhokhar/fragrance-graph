[build]
  # Tell Netlify where the frontend code lives
  base = "frontend"
  
  # The command to build the React application
  command = "npm run build"
  
  # The folder that contains the final website files after building
  publish = "build"

[[redirects]]
  # This ensures that React Router works correctly on refresh
  from = "/*"
  to = "/index.html"
  status = 200
